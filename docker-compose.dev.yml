version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: peoplecore_db_dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: K@m1l@12
      MYSQL_DATABASE:      peoplecore
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_dev_data: